spring:
  application:
    name: pickcar-consumer
  profiles:
    active: local
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

mq:
  cycle:
    queue: cycle-queue
    exchange: exchange-cycle
    routing-key: cycle.key
  event:
    queue: event-queue
    exchange: exchange-event
    routing-key: event.key
  domain-command:
    queue: domain-command-queue
    exchange: exchange-domain-command
    routing-key: domaincommand.key

logging:
  module-name: consumer
  sensitive-field-rules:
    - path: "none"
      fields: [ "none" ]